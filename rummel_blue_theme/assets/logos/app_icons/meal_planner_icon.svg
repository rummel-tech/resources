<?xml version="1.0" encoding="UTF-8"?>
<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Meal Planner App Icon -->
  <defs>
    <linearGradient id="meal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="60" height="60" rx="12" fill="url(#meal-grad)"/>

  <!-- Fork and Knife -->
  <!-- Fork -->
  <rect x="20" y="15" width="2" height="30" rx="1" fill="white"/>
  <rect x="18" y="15" width="2" height="12" rx="1" fill="white"/>
  <rect x="22" y="15" width="2" height="12" rx="1" fill="white"/>

  <!-- Knife -->
  <rect x="38" y="15" width="2" height="30" rx="1" fill="white"/>
  <path d="M 37 15 L 37 25 L 41 25 L 41 15 Z" fill="white"/>

  <!-- Small R badge -->
  <circle cx="48" cy="12" r="8" fill="#FF9800"/>
  <text x="48" y="16" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">R</text>
</svg>
