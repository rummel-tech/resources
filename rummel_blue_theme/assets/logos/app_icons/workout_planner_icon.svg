<?xml version="1.0" encoding="UTF-8"?>
<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Workout Planner App Icon -->
  <defs>
    <linearGradient id="workout-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1976D2;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="60" height="60" rx="12" fill="url(#workout-grad)"/>

  <!-- Dumbbell icon -->
  <circle cx="15" cy="30" r="6" fill="white"/>
  <rect x="19" y="27" width="22" height="6" rx="2" fill="white"/>
  <circle cx="45" cy="30" r="6" fill="white"/>

  <!-- Small R badge -->
  <circle cx="48" cy="12" r="8" fill="#FF9800"/>
  <text x="48" y="16" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">R</text>
</svg>
